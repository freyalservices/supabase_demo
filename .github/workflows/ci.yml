name: InfraSight CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────
  # 1. Lint & test the Gateway service
  # ─────────────────────────────────────────────
  test-gateway:
    name: Gateway — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: gateway-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          PROCESSING_SERVICE_URL: http://localhost:8001
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # 2. Lint & test the Processing service
  # ─────────────────────────────────────────────
  test-processing:
    name: Processing — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: processing-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: processing-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # 3. Build & lint the Frontend
  # ─────────────────────────────────────────────
  build-frontend:
    name: Frontend — install & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8000' }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # 4. Build Docker images (verify Dockerfiles)
  # ─────────────────────────────────────────────
  build-docker:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [test-gateway, test-processing, build-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway-service
          push: false
          tags: infrasight/gateway:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build processing image
        uses: docker/build-push-action@v5
        with:
          context: ./processing-service
          push: false
          tags: infrasight/processing:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: infrasight/frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 5. Optional: Push images to GHCR on main
  # ─────────────────────────────────────────────
  push-images:
    name: Push images to GHCR
    runs-on: ubuntu-latest
    needs: [build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./gateway-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/infrasight-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push processing image
        uses: docker/build-push-action@v5
        with:
          context: ./processing-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/infrasight-processing:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/infrasight-frontend:latest
          build-args: VITE_API_URL=${{ secrets.VITE_API_URL || 'http://localhost:8000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
